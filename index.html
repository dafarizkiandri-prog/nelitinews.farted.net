<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Kucing Lucu</title>
    <style>
        /* --- CSS UNTUK MENATA TAMPILAN --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fce4ec; /* Warna background pink muda */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Mencegah scrollbar */
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #ec407a;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* --- CSS UNTUK MEMBUAT KUCING (HANYA CSS) --- */
        .cat-scene {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            cursor: pointer;
        }

        /* Kepala Kucing */
        .head {
            position: absolute;
            top: 40px;
            left: 25px;
            width: 150px;
            height: 130px;
            background-color: #f3f3f3; /* Warna bulu putih abu */
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 10;
            transition: transform 0.1s ease-out; /* Untuk efek mengikuti mouse */
        }

        /* Telinga */
        .ear {
            position: absolute;
            top: -20px;
            width: 0;
            height: 0;
            border-left: 35px solid transparent;
            border-right: 35px solid transparent;
            border-bottom: 60px solid #f3f3f3; /* Warna luar telinga */
            z-index: 1;
        }

        .ear.left {
            left: 5px;
            transform: rotate(-15deg);
            animation: earTwitchLeft 5s infinite;
        }

        .ear.right {
            right: 5px;
            transform: rotate(15deg);
            animation: earTwitchRight 5s infinite 0.2s; /* Sedikit delay */
        }

        /* Bagian dalam telinga (Pink) */
        .ear::after {
            content: '';
            position: absolute;
            top: 10px;
            left: -20px;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid #ffcdd2;
        }

        /* Mata Container */
        .eyes-box {
            position: absolute;
            top: 45px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 25px;
            box-sizing: border-box;
        }

        /* Mata Hitam */
        .eye {
            width: 25px;
            height: 25px;
            background-color: #2c3e50;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        /* Pupil Mata (Cahaya putih) */
        .eye::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
        }

        /* Kelopak Mata (Untuk Animasi Kedip) */
        .eyelid {
            position: absolute;
            top: -100%; /* Sembunyi di atas */
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f3f3f3; /* Sama dengan warna kepala */
            border-radius: 50%;
            animation: blink 4s infinite;
            z-index: 2;
        }

        /* Hidung */
        .nose {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 10px;
            background-color: #e57373; /* Pink tua */
            border-radius: 50% 50% 40% 40%;
        }

        /* Mulut/Pipi */
        .mouth-box {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
        }

        .mouth-box::before, .mouth-box::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 15px;
            border: 2px solid #a1a1a1;
            border-top: transparent;
            border-radius: 0 0 10px 10px;
        }

        .mouth-box::before {
            left: 0;
            border-right: transparent;
        }

        .mouth-box::after {
            right: 0;
            border-left: transparent;
        }

        /* Kumis */
        .whiskers {
            position: absolute;
            top: 70px;
            width: 130px;
            left: 10px;
        }

        .whisker {
            position: absolute;
            height: 1px;
            background-color: #a1a1a1;
            width: 40px;
        }

        /* Kumis Kiri */
        .whisker.l1 { left: 0; top: 5px; transform: rotate(10deg); }
        .whisker.l2 { left: -5px; top: 15px; transform: rotate(0deg); }
        .whisker.l3 { left: 0; top: 25px; transform: rotate(-10deg); }

        /* Kumis Kanan */
        .whisker.r1 { right: 0; top: 5px; transform: rotate(-10deg); }
        .whisker.r2 { right: -5px; top: 15px; transform: rotate(0deg); }
        .whisker.r3 { right: 0; top: 25px; transform: rotate(10deg); }


        /* --- KEYFRAMES UNTUK ANIMASI --- */

        /* Animasi Mengedip */
        @keyframes blink {
            0%, 90%, 100% { top: -100%; } /* Terbuka */
            95% { top: 0; } /* Tertutup */
        }

        /* Animasi Telinga Kiri Gerak */
        @keyframes earTwitchLeft {
            0%, 90%, 100% { transform: rotate(-15deg); }
            92% { transform: rotate(-25deg); }
            94% { transform: rotate(-15deg); }
        }

        /* Animasi Telinga Kanan Gerak */
        @keyframes earTwitchRight {
            0%, 85%, 95%, 100% { transform: rotate(15deg); }
            88% { transform: rotate(25deg); }
            92% { transform: rotate(10deg); }
        }

        /* Teks Instruksi */
        .info {
            margin-top: 180px;
            color: #888;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Halo! Meow~</h1>
        
        <!-- Area Kucing -->
        <div class="cat-scene" id="catScene">
            
            <!-- Telinga (di luar kepala agar di belakang) -->
            <div class="ear left"></div>
            <div class="ear right"></div>

            <!-- Kepala Kucing -->
            <div class="head" id="catHead">
                
                <!-- Mata -->
                <div class="eyes-box">
                    <div class="eye">
                        <div class="eyelid"></div>
                    </div>
                    <div class="eye">
                        <div class="eyelid"></div>
                    </div>
                </div>

                <!-- Hidung & Mulut -->
                <div class="nose"></div>
                <div class="mouth-box"></div>

                <!-- Kumis -->
                <div class="whiskers">
                    <div class="whisker l1"></div>
                    <div class="whisker l2"></div>
                    <div class="whisker l3"></div>
                    <div class="whisker r1"></div>
                    <div class="whisker r2"></div>
                    <div class="whisker r3"></div>
                </div>
            </div>
        </div>

        <p class="info">Gerakkan kursor mouse kamu di layar</p>
    </div>

    <script>
        // --- JAVASCRIPT UNTUK EFEK MENGIKUTI MOUSE ---
        const head = document.getElementById('catHead');
        const scene = document.body; // Kita deteksi gerakan di seluruh body

        scene.addEventListener('mousemove', (e) => {
            // Mendapatkan posisi mouse
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // Mendapatkan posisi tengah jendela
            const windowCenterX = window.innerWidth / 2;
            const windowCenterY = window.innerHeight / 2;

            // Menghitung seberapa jauh mouse dari tengah (dalam persen -1 ke 1)
            // Kita batasi agar gerakan tidak terlalu ekstrim
            const moveX = (mouseX - windowCenterX) / windowCenterX;
            const moveY = (mouseY - windowCenterY) / windowCenterY;

            // Membatasi rotasi dan pergeseran maksimal (misal maks 15px / 10deg)
            const maxMove = 15;
            const maxRotation = 10;

            const finalX = moveX * maxMove;
            const finalY = moveY * maxMove;
            const finalRotate = moveX * maxRotation;

            // Menerapkan transformasi ke kepala kucing
            // translate = bergeser sedikit, rotate = menengok
            head.style.transform = `translate(${finalX}px, ${finalY}px) rotate(${finalRotate}deg)`;
        });

        // Reset posisi jika mouse keluar dari jendela
        scene.addEventListener('mouseleave', () => {
            head.style.transform = `translate(0px, 0px) rotate(0deg)`;
        });
    </script>
</body>
</html>
